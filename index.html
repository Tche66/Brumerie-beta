<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&display=swap">
    <link rel="icon" type="image/png" href="/assets/Logos/logo-app-icon.png" />
    <link rel="apple-touch-icon" href="/assets/Logos/logo-app-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Brumerie" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-startup-image" href="/assets/Logos/logo-app-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- viewport inchangé — ne pas modifier, affecte l'APK Capacitor -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-visual" />
    <meta name="theme-color" content="#16A34A" />

    <!-- ═══════════════════════════════════════════════════
         SEO — Meta tags statiques (base)
         Remplacés dynamiquement par src/utils/seo.ts
         selon la page active (home / product / seller)
    ═══════════════════════════════════════════════════ -->
    <title>Brumerie — Le social commerce de ton quartier en Côte d'Ivoire</title>
    <meta name="description" content="Achète et vends des articles près de chez toi en Côte d'Ivoire. Mode, high-tech, beauté, maison — des milliers d'annonces dans ton quartier. Abidjan, Bouaké, Yamoussoukro et partout en CI. 🇨🇮" />
    <meta name="keywords" content="marketplace Côte d'Ivoire, vente en ligne CI, acheter vendre Abidjan, marché local Bouaké, annonces Cocody Yopougon, e-commerce ivoirien, seconde main, social commerce Afrique, marketplace Abidjan, Brumerie" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="author" content="Brumerie" />
    <meta name="geo.region" content="CI" />
    <meta name="geo.placename" content="Côte d'Ivoire" />
    <link rel="canonical" href="https://brumerie.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Brumerie — Le social commerce de ton quartier" />
    <meta property="og:description" content="Achète et vends dans ton quartier en Côte d'Ivoire. Mode, high-tech, beauté — la marketplace locale de confiance. 🇨🇮" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://brumerie.com/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://brumerie.com" />
    <meta property="og:site_name" content="Brumerie" />
    <meta property="og:locale" content="fr_CI" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brumerie — Le social commerce de ton quartier" />
    <meta name="twitter:description" content="Achète et vends dans ton quartier en Côte d'Ivoire. La marketplace locale de confiance. 🇨🇮" />
    <meta name="twitter:image" content="https://brumerie.com/assets/og-image.png" />

    <!-- ═══════════════════════════════════════════════════
         Structured Data JSON-LD — Organisation + WebSite
         Remplacé dynamiquement sur les pages articles
    ═══════════════════════════════════════════════════ -->
    <script type="application/ld+json" data-brumerie-ld>
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://brumerie.com/#website",
          "name": "Brumerie",
          "url": "https://brumerie.com",
          "description": "Le premier social commerce de Côte d'Ivoire — achète et vends dans ton quartier",
          "inLanguage": "fr-CI",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://brumerie.com?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://brumerie.com/#organization",
          "name": "Brumerie",
          "url": "https://brumerie.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://brumerie.com/assets/Logos/logo-app-icon.png"
          },
          "description": "Brumerie est le premier social commerce ivoirien. Achetez et vendez des articles dans votre quartier en toute confiance.",
          "areaServed": {
            "@type": "Country",
            "name": "Côte d'Ivoire",
            "identifier": "CI"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer support",
            "email": "contact.brumerie@gmail.com"
          },
          "sameAs": [
            "https://www.instagram.com/brumerie",
            "https://www.tiktok.com/@brumerie"
          ]
        },
        {
          "@type": "MobileApplication",
          "name": "Brumerie",
          "operatingSystem": "Android, iOS",
          "applicationCategory": "ShoppingApplication",
          "description": "Social commerce local — achète et vends dans ton quartier en Côte d'Ivoire",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "XOF"
          }
        },
        {
          "@type": "ItemList",
          "@id": "https://brumerie.com/#categories",
          "name": "Catégories Brumerie",
          "itemListElement": [
            {"@type": "ListItem", "position": 1, "name": "Mode & Prêt-à-porter", "url": "https://brumerie.com?cat=fashion"},
            {"@type": "ListItem", "position": 2, "name": "High-Tech & Téléphones", "url": "https://brumerie.com?cat=tech"},
            {"@type": "ListItem", "position": 3, "name": "Beauté & Cosmétiques", "url": "https://brumerie.com?cat=beauty"},
            {"@type": "ListItem", "position": 4, "name": "Maison & Décoration", "url": "https://brumerie.com?cat=home"},
            {"@type": "ListItem", "position": 5, "name": "Alimentation", "url": "https://brumerie.com?cat=food"}
          ]
        }
      ]
    }
    </script>

    <!-- Google Sign-In Web Client ID injecté par Vite au build — NE PAS TOUCHER -->
    <script>
      window.__GOOGLE_WEB_CLIENT_ID__ = '%VITE_GOOGLE_WEB_CLIENT_ID%';
    </script>

    <style>
      /* === SPLASH SCREEN === */
      #splash {
        position: fixed;
        inset: 0;
        background: #FFFFFF;
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2316A34A' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease, transform 0.5s ease, visibility 0.5s;
      }

      .logo-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 32px;
      }
      .halo {
        position: absolute;
        width: 160px;
        height: 160px;
        background: radial-gradient(circle, rgba(22,163,74,0.1) 0%, transparent 70%);
        border-radius: 50%;
        animation: glow 3s infinite ease-in-out;
      }
      #splash img {
        width: 100px;
        height: 100px;
        object-fit: contain;
        position: relative;
        z-index: 2;
        animation: entrance 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .brand-name {
        text-align: center;
      }
      .brand-name h1 {
        font-family: 'Syne', sans-serif;
        font-weight: 900;
        font-size: 42px;
        letter-spacing: -2px;
        color: #0F172A;
        margin: 0;
        line-height: 1;
        background: linear-gradient(135deg, #0F172A 0%, #16A34A 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .brand-name .tagline {
        font-family: 'Syne', sans-serif;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: #16A34A;
        margin-top: 8px;
        opacity: 0.8;
      }
      .brand-name .country {
        font-size: 10px;
        color: #94A3B8;
        font-weight: 600;
        letter-spacing: 2px;
        margin-top: 4px;
        text-transform: uppercase;
      }

      .loader-bar {
        position: absolute;
        bottom: 72px;
        width: 80px;
        height: 2px;
        background: #F1F5F9;
        border-radius: 10px;
        overflow: hidden;
      }
      .loader-progress {
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #16A34A, #22C55E);
        transform: translateX(-100%);
        animation: loading 2s infinite ease-in-out;
        border-radius: 10px;
      }

      @keyframes entrance {
        from { transform: translateY(24px) scale(0.9); opacity: 0; }
        to { transform: translateY(0) scale(1); opacity: 1; }
      }
      @keyframes glow {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.3); opacity: 1; }
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(0); }
        100% { transform: translateX(100%); }
      }
      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
        transform: scale(0.97);
      }
      @keyframes toast-progress {
        from { width: 100%; }
        to { width: 0%; }
      }
      @keyframes slide-up {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
  </head>
  <body>

    <div id="splash">
      <div class="logo-container">
        <div class="halo"></div>
        <img src="/assets/Logos/logo-app-icon.png" alt="Brumerie — Marché local Abidjan" />
      </div>
      <div class="brand-name">
        <h1>BRUMERIE</h1>
        <p class="tagline">Mise en relation locale</p>
        <p class="country">🇨🇮 Abidjan · Côte d'Ivoire</p>
      </div>
      <div class="loader-bar">
        <div class="loader-progress"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Service Worker PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Brumerie PWA ready'))
            .catch(err => console.error('SW Error', err));
        });
      }

      // Splash → fade out après 1.8s
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('splash');
          if (splash) splash.classList.add('fade-out');
        }, 1800);
      });
    </script>
  </body>
</html>
