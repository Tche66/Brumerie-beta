    <style>
      /* === SPLASH SCREEN BRUMERIE === */
      #splash {
        position: fixed;
        inset: 0;
        background: #FFFFFF;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-bottom: 15vh;
        z-index: 99999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0, 1), transform 0.6s cubic-bezier(0.4, 0, 0, 1), visibility 0.6s;
        overflow: hidden;
      }

      /* Fond animé — particules vertes */
      #splash::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 20% 80%, rgba(22,163,74,0.06) 0%, transparent 50%),
          radial-gradient(circle at 80% 20%, rgba(5,95,70,0.05) 0%, transparent 50%);
        animation: bg-shift 4s ease-in-out infinite alternate;
      }

      @keyframes bg-shift {
        from { opacity: 0.6; transform: scale(1); }
        to { opacity: 1; transform: scale(1.1); }
      }

      .splash-content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Logo avec ring animé */
      .logo-wrap {
        position: relative;
        margin-bottom: 28px;
      }
      .logo-ring {
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #16A34A;
        border-right-color: #16A34A;
        animation: spin-ring 1.5s linear infinite;
      }
      .logo-ring-outer {
        position: absolute;
        inset: -20px;
        border-radius: 50%;
        border: 1px solid transparent;
        border-bottom-color: rgba(22,163,74,0.3);
        border-left-color: rgba(22,163,74,0.3);
        animation: spin-ring 2.5s linear infinite reverse;
      }
      .logo-glow {
        position: absolute;
        inset: -30px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(22,163,74,0.15) 0%, transparent 70%);
        animation: pulse-glow 2s ease-in-out infinite;
      }
      #splash img {
        width: 80px;
        height: 80px;
        object-fit: contain;
        position: relative;
        z-index: 2;
        border-radius: 20px;
        animation: logo-enter 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes spin-ring {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse-glow {
        0%, 100% { transform: scale(0.9); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 1; }
      }
      @keyframes logo-enter {
        from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
        to { transform: scale(1) rotate(0deg); opacity: 1; }
      }

      /* Texte marque */
      .brand-name {
        text-align: center;
        animation: text-enter 0.7s 0.3s cubic-bezier(0.4, 0, 0, 1) both;
      }
      @keyframes text-enter {
        from { transform: translateY(16px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .brand-name h1 {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 36px;
        letter-spacing: -1.5px;
        margin: 0;
        line-height: 1;
        background: linear-gradient(135deg, #0F172A 0%, #065F46 50%, #16A34A 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .brand-name .tagline {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #475569;
        margin-top: 10px;
      }

      /* Barre de chargement */
      .splash-loader {
        position: absolute;
        bottom: 80px;
        width: 120px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        animation: text-enter 0.5s 0.6s cubic-bezier(0.4, 0, 0, 1) both;
      }
      .loader-track {
        width: 100%;
        height: 3px;
        background: #E2E8F0;
        border-radius: 10px;
        overflow: hidden;
      }
      .loader-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #16A34A, #10B981, #16A34A);
        background-size: 200% 100%;
        border-radius: 10px;
        animation: fill-progress 4.5s ease-out forwards, shimmer 1.5s linear infinite;
      }
      .loader-text {
        font-size: 9px;
        font-weight: 700;
        color: #94A3B8;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .loader-dots {
        display: inline-flex;
        gap: 2px;
        margin-left: 4px;
      }
      .loader-dots span {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #94A3B8;
        animation: dot-bounce 1.2s infinite;
      }
      .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
      .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes fill-progress {
        0% { width: 0%; }
        30% { width: 40%; }
        60% { width: 70%; }
        90% { width: 85%; }
        100% { width: 95%; }
      }
      @keyframes shimmer {
        from { background-position: 200% 0; }
        to { background-position: -200% 0; }
      }
      @keyframes dot-bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-3px); opacity: 1; }
      }

      /* Features défilantes */
      .splash-features {
        margin-top: 20px;
        width: 220px;
        overflow: hidden;
        mask-image: linear-gradient(90deg, transparent 0%, black 15%, black 85%, transparent 100%);
        -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 15%, black 85%, transparent 100%);
        animation: text-enter 0.6s 0.8s cubic-bezier(0.4, 0, 0, 1) both;
      }
      .features-track {
        display: flex;
        align-items: center;
        gap: 10px;
        white-space: nowrap;
        animation: scroll-features 8s linear infinite;
      }
      .features-track span {
        font-size: 10px;
        font-weight: 700;
        color: #64748B;
        letter-spacing: 0.5px;
      }
      .features-track .dot {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #16A34A;
        flex-shrink: 0;
      }
      @keyframes scroll-features {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }

      /* Footer splash */
      .splash-footer {
        position: absolute;
        bottom: 40px;
        text-align: center;
        animation: text-enter 0.5s 1.2s cubic-bezier(0.4, 0, 0, 1) both;
      }
      .splash-footer p {
        font-size: 10px;
        font-weight: 700;
        color: #64748B;
        letter-spacing: 0.5px;
        margin: 0;
      }
      .splash-footer .splash-flag {
        font-size: 8px;
        font-weight: 600;
        color: #94A3B8;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-top: 4px;
      }

      /* Fade out */
      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
        transform: scale(1.02);
        pointer-events: none;
      }
      #splash.fade-out .loader-fill {
        width: 100% !important;
        transition: width 0.3s;
      }

      /* Utils globaux */
      @keyframes toast-progress {
        from { width: 100%; }
        to { width: 0%; }
      }
      @keyframes slide-up {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
  </head>

    <script>
      // Service Worker PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Brumerie PWA ready'))
            .catch(err => console.error('SW Error', err));
        });
      }

      // Splash → visible minimum 3s, puis fade out quand React est prêt
      var splashReady = false;
      var splashMinTime = false;
      window.__hideSplash = function () {
        splashReady = true;
        if (splashMinTime) {
          var splash = document.getElementById('splash');
          if (splash && !splash.classList.contains('fade-out')) {
            splash.classList.add('fade-out');
          }
        }
      };
      setTimeout(function () {
        splashMinTime = true;
        if (splashReady) window.__hideSplash();
      }, 5000);
      // Fallback : si React ne se monte jamais (crash), cacher après 8s
      setTimeout(function () {
        var splash = document.getElementById('splash');
        if (splash) splash.classList.add('fade-out');
      }, 8000);
    </script>
