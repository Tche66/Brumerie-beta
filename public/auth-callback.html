<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#16A34A"/>
  <title>Connexion en cours… — Brumerie</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
    img{width:72px;height:72px;object-fit:contain;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.96)}}
    .spinner{width:40px;height:40px;border:4px solid #E2E8F0;border-top-color:#16A34A;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:3px;color:#16A34A}
    .error-msg{color:#EF4444;font-size:13px;text-transform:none;letter-spacing:0;text-align:center;max-width:280px;line-height:1.6;font-weight:600}
    .btn{margin-top:8px;padding:14px 28px;background:#16A34A;color:#fff;border:none;border-radius:2rem;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
  </style>
</head>
<body>
  <img src="/favicon.png" alt="Brumerie"/>
  <div class="spinner" id="spinner"></div>
  <p id="msg">Connexion Google…</p>

  <!-- Firebase 10 compat via CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    function setMsg(text, isError) {
      document.getElementById('msg').textContent = text;
      if (isError) {
        document.getElementById('msg').className = 'error-msg';
        document.getElementById('spinner').style.display = 'none';
      }
    }

    function showRetry() {
      var btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = 'Retour';
      btn.onclick = function() { window.location.href = '/'; };
      document.body.appendChild(btn);
    }

    async function main() {
      try {
        // Récupérer la config Firebase depuis localStorage (stockée par l'app au premier chargement)
        var cfgRaw = localStorage.getItem('brumerie_fb_cfg');
        if (!cfgRaw) {
          setMsg('Configuration introuvable. Retour…');
          setTimeout(function(){ window.location.href = '/'; }, 1500);
          return;
        }
        var cfg = JSON.parse(cfgRaw);

        // Init Firebase
        var app  = firebase.apps.length ? firebase.app() : firebase.initializeApp(cfg);
        var auth = firebase.auth();
        var db   = firebase.firestore();

        setMsg('Vérification Google…');
        var result = await auth.getRedirectResult();

        var user = result && result.user ? result.user : auth.currentUser;

        if (!user) {
          setMsg('Session introuvable. Reconnecte-toi.', true);
          showRetry();
          return;
        }

        setMsg('Création du profil…');
        var isNew = await ensureProfile(db, user);

        setMsg('Bienvenue 🎉');

        // Rediriger vers l'app avec le bon paramètre
        var dest = isNew ? '/?google_new=1' : '/?google_ok=1';
        window.location.replace(dest);

      } catch(e) {
        console.error('[Callback]', e);
        setMsg('Erreur : ' + (e.code || e.message || 'Inconnue'), true);
        showRetry();
      }
    }

    async function ensureProfile(db, user) {
      var ref  = db.collection('users').doc(user.uid);
      var snap = await ref.get();
      if (snap.exists) return false;
      await ref.set({
        id: user.uid, uid: user.uid,
        email: user.email || '',
        name:  user.displayName || '',
        phone: '', role: 'buyer', neighborhood: '',
        isVerified: false,
        photoURL: user.photoURL || '',
        bookmarkedProductIds: [],
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        publicationCount: 0, publicationLimit: 50,
      });
      return true;
    }

    main();
  </script>
</body>
</html>
