name: Build Brumerie APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Install deps
        run: npm install --legacy-peer-deps

      # ── 1. Injecter les secrets AVANT le build ──────────────────
      - name: Inject secrets into config files
        run: |
          # Google Web Client ID dans capacitor.config.ts
          sed -i 's|GOOGLE_WEB_CLIENT_ID_PLACEHOLDER|${{ secrets.GOOGLE_WEB_CLIENT_ID }}|g' capacitor.config.ts
          # Google Web Client ID dans strings.xml (lu par le plugin Android natif)
          sed -i 's|GOOGLE_WEB_CLIENT_ID_PLACEHOLDER|${{ secrets.GOOGLE_WEB_CLIENT_ID }}|g' android/app/src/main/res/values/strings.xml
          echo "✅ Secrets injectés"

      # ── 2. Build Vite ───────────────────────────────────────────
      - name: Build web app
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_DOMAIN: ${{ secrets.VITE_APP_DOMAIN }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: npm run build

      # ── 3. Capacitor sync ───────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 4. Réinjecter strings.xml après cap sync (qui peut l'écraser) ──
      - name: Re-inject Google Client ID after cap sync
        run: |
          sed -i 's|GOOGLE_WEB_CLIENT_ID_PLACEHOLDER|${{ secrets.GOOGLE_WEB_CLIENT_ID }}|g' android/app/src/main/res/values/strings.xml
          # Vérifier que l'injection a bien fonctionné
          grep "server_client_id" android/app/src/main/res/values/strings.xml
          echo "✅ server_client_id confirmé dans strings.xml"

      # ── 5. S'assurer que le plugin Google Auth est dans Gradle ──
      - name: Patch capacitor.settings.gradle pour Google Auth
        run: |
          if ! grep -q "codetrix-studio-capacitor-google-auth" android/capacitor.settings.gradle; then
            echo "" >> android/capacitor.settings.gradle
            echo "include ':codetrix-studio-capacitor-google-auth'" >> android/capacitor.settings.gradle
            echo "project(':codetrix-studio-capacitor-google-auth').projectDir = new File('../node_modules/@codetrix-studio/capacitor-google-auth/android')" >> android/capacitor.settings.gradle
            echo "✅ Google Auth ajouté à capacitor.settings.gradle"
          else
            echo "✅ Google Auth déjà présent"
          fi

      # ── 6. Icônes Brumerie ──────────────────────────────────────
      - name: Apply Brumerie icons
        run: |
          for folder in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp brumerie-icons/$folder/ic_launcher.png android/app/src/main/res/$folder/ic_launcher.png
            cp brumerie-icons/$folder/ic_launcher_round.png android/app/src/main/res/$folder/ic_launcher_round.png
            [ -f brumerie-icons/$folder/ic_launcher_foreground.png ] && \
              cp brumerie-icons/$folder/ic_launcher_foreground.png android/app/src/main/res/$folder/ic_launcher_foreground.png || true
          done
          echo "✅ Icônes Brumerie appliquées"

      # ── 7. Restaurer le keystore depuis KEYSTORE_BASE64 ─────────
      # Même keystore à chaque build = même SHA-1 = Google Sign-In fonctionne
      - name: Restore keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/brumerie.keystore
          # Vérifier que le keystore est valide
          keytool -list -keystore android/app/brumerie.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" 2>&1 | head -5
          echo "✅ Keystore restauré"

      # ── 8. Afficher le SHA-1 du keystore ───────────────────────
      - name: Show Release SHA-1
        run: |
          keytool -list -v \
            -keystore android/app/brumerie.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            | grep SHA1
          echo "✅ Copie ce SHA-1 et ajoute-le dans Firebase Console"

      # ── 9. Build APK signé ──────────────────────────────────────
      - name: Build signed APK
        working-directory: android
        env:
          KEYSTORE_PATH: brumerie.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk brumerie-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Brumerie-APK
          path: brumerie-android.apk
          retention-days: 60
